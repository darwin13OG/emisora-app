<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --primary: #10b981; /* El verde de tu logo */
            --bg: #0f172a;      /* Azul medianoche profundo */
            --card: #1e293b;    /* Gris azulado */
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 5px;
        }

        .logo-title { font-size: 1.4rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 8px; }

        .stats-top { display: flex; gap: 10px; }
        .stat-item {
            background: var(--card);
            padding: 8px 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; display: block; }
        .stat-val { font-weight: 800; font-size: 1rem; color: var(--primary); }

        /* TABS */
        .tabs {
            display: flex;
            background: var(--card);
            padding: 5px;
            border-radius: 14px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            color: var(--text-dim);
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: var(--bg);
        }

        .panel { display: none; }
        .panel.active { display: block; }

        /* FORMULARIO */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; margin-bottom: 5px; color: var(--text-dim); font-weight: 600; }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: var(--card);
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
        }
        input:focus { border-color: var(--primary); outline: none; }
        
        .btn-save {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            margin-top: 10px;
        }

        /* LISTA DJ MINIMALISTA */
        .row-dj {
            background: var(--card);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-left: 4px solid var(--primary);
            transition: 0.3s;
        }
        .row-dj.done {
            opacity: 0.4;
            border-left-color: #475569;
            filter: grayscale(1);
        }
        .row-info { flex: 1; }
        .row-main { font-weight: 700; font-size: 0.95rem; margin-bottom: 2px; }
        .row-sub { font-size: 0.75rem; color: var(--text-dim); }
        .row-msg { 
            font-size: 0.85rem; 
            margin-top: 6px; 
            padding: 6px; 
            background: rgba(0,0,0,0.2); 
            border-radius: 6px; 
            font-style: italic;
        }

        .btn-check {
            background: #334155;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .row-dj.done .btn-check { background: var(--primary); color: var(--bg); }

        .btn-clear {
            width: 100%;
            background: none;
            border: 1px dashed #ef4444;
            color: #ef4444;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: 700;
        }

        /* TOAST */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--primary);
            color: var(--bg);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 800;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-title">🎵 Radio</div>
        <div class="stats-top">
            <div class="stat-item" ondblclick="resetCaja()">
                <span class="stat-label">Caja</span>
                <span class="stat-val" id="caja">$0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Pendientes</span>
                <span class="stat-val" id="pendientes">0</span>
            </div>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" id="tReg" onclick="tab('reg')">Nuevo</button>
        <button class="tab-btn" id="tDj" onclick="tab('dj')">Cola DJ</button>
    </div>

    <!-- REGISTRO -->
    <div id="pReg" class="panel active">
        <form id="fPedido">
            <div class="form-group">
                <label>De (Remitente)</label>
                <input type="text" id="de" placeholder="Anónimo">
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex: 2;">
                    <label>Para</label>
                    <input type="text" id="para" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Grado</label>
                    <select id="grado">
                        <option>9°</option><option>10°</option><option>11°</option><option>Otro</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Canción / Artista</label>
                <input type="text" id="cancion" required>
            </div>
            <div class="form-group">
                <label>Mensaje Personalizado</label>
                <textarea id="msg" rows="2"></textarea>
            </div>
            <button type="submit" class="btn-save">Cobrar $500 y Guardar</button>
        </form>
    </div>

    <!-- VISTA DJ -->
    <div id="pDj" class="panel">
        <div id="lista-dj"></div>
        <button class="btn-clear" onclick="limpiarSonadas()">Limpiar canciones ya sonadas</button>
    </div>

    <div id="toast">¡Guardado! +$500</div>

    <script>
        let db = JSON.parse(localStorage.getItem('rad_pedidos')) || [];
        let caja = parseInt(localStorage.getItem('rad_caja')) || 0;

        function tab(t) {
            document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
            if(t === 'reg') { 
                document.getElementById('pReg').classList.add('active'); 
                document.getElementById('tReg').classList.add('active'); 
            } else { 
                document.getElementById('pDj').classList.add('active'); 
                document.getElementById('tDj').classList.add('active'); 
            }
        }

        function render() {
            const list = document.getElementById('lista-dj');
            list.innerHTML = '';
            
            document.getElementById('caja').innerText = `$${caja.toLocaleString()}`;
            document.getElementById('pendientes').innerText = db.filter(x => !x.ok).length;

            db.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `row-dj ${item.ok ? 'done' : ''}`;
                div.innerHTML = `
                    <div class="row-info" onclick="toggle(${index})">
                        <div class="row-main">${item.cancion}</div>
                        <div class="row-sub">Para: ${item.para} (${item.grado}) • De: ${item.de}</div>
                        ${item.msg ? `<div class="row-msg">"${item.msg}"</div>` : ''}
                    </div>
                    <button class="btn-check" onclick="toggle(${index})">${item.ok ? '✓' : ''}</button>
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('fPedido').onsubmit = function(e) {
            e.preventDefault();
            const nuevo = {
                de: document.getElementById('de').value || 'Anónimo',
                para: document.getElementById('para').value,
                grado: document.getElementById('grado').value,
                cancion: document.getElementById('cancion').value,
                msg: document.getElementById('msg').value,
                ok: false
            };
            db.push(nuevo);
            caja += 500;
            save();
            this.reset();
            render();
            showToast();
        };

        function toggle(i) {
            db[i].ok = !db[i].ok;
            save();
            render();
        }

        function limpiarSonadas() {
            if(confirm('¿Eliminar las canciones que ya sonaron?')) {
                db = db.filter(x => !x.ok);
                save();
                render();
            }
        }

        function resetCaja() {
            if(confirm('¿Reiniciar la caja a $0?')) {
                caja = 0;
                save();
                render();
            }
        }

        function save() {
            localStorage.setItem('rad_pedidos', JSON.stringify(db));
            localStorage.setItem('rad_caja', caja);
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        render();
    </script>
</body>
</html>
