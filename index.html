<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emisora App</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="icon.png">
    <style>
        :root {
            --primary: #10b981; --bg: #0f172a; --card: #1e293b; --text: #f8fafc;
            --text-dim: #94a3b8; --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); padding: 12px; max-width: 500px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo-title { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
        .stats-top { display: flex; gap: 8px; }
        .stat-item { background: var(--card); padding: 6px 10px; border-radius: 10px; border: 1px solid #334155; text-align: center; min-width: 80px;}
        .stat-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; display: block; }
        .stat-val { font-weight: 800; font-size: 0.9rem; color: var(--primary); }

        .tabs { display: flex; background: var(--card); padding: 4px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; color: var(--text-dim); font-weight: 700; border-radius: 9px; }
        .tab-btn.active { background: var(--primary); color: var(--bg); }

        .panel { display: none; }
        .panel.active { display: block; }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; margin-bottom: 4px; color: var(--text-dim); font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; background: var(--card); border: 1px solid #334155; border-radius: 10px; color: white; font-size: 1rem; }
        
        .btn-save { width: 100%; padding: 15px; background: var(--primary); color: var(--bg); border: none; border-radius: 10px; font-weight: 800; font-size: 1.1rem; }

        .row-dj { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; border: 1px solid #334155; border-left: 4px solid var(--primary); }
        .row-dj.done { opacity: 0.3; filter: grayscale(1); border-left-color: #475569; }
        .row-info { flex: 1; overflow: hidden; }
        .row-main { font-weight: 800; font-size: 0.95rem; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-sub { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
        
        .btn-check { background: #334155; border: none; width: 40px; height: 40px; border-radius: 10px; color: white; font-size: 1.2rem; }
        .row-dj.done .btn-check { background: var(--primary); color: var(--bg); }
        .btn-script { background: #0f172a; border: 1px solid var(--primary); width: 40px; height: 40px; border-radius: 10px; color: var(--primary); font-size: 1.2rem; display:flex; align-items:center; justify-content:center; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-box { background: var(--card); padding: 20px; border-radius: 15px; width: 100%; max-width: 400px; border: 1px solid var(--primary); }
        .modal-script { background: #0f172a; padding: 15px; border-radius: 10px; border-left: 4px solid var(--primary); font-style: italic; margin: 15px 0; line-height: 1.5; color: #fff; }
        .modal-btns { display: flex; gap: 10px; }
        .m-btn { flex: 1; padding: 12px; border-radius: 8px; border: none; font-weight: 700; }
        .btn-cancel { background: #334155; color: white; }
        .btn-confirm { background: var(--danger); color: white; }
        .btn-ok { background: var(--primary); color: var(--bg); width: 100%; }

        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-weight: 800; display: none; z-index: 2000; }
    </style>
</head>
<body>

    <header>
        <div class="logo-title">🎙️ Emisora</div>
        <div class="stats-top">
            <div class="stat-item" id="cajaDiv">
                <span class="stat-label">Caja</span>
                <span class="stat-val" id="caja">$0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Cola</span>
                <span class="stat-val" id="pendientes">0</span>
            </div>
        </div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" id="tReg" onclick="tab('reg')">Registro</button>
        <button class="tab-btn" id="tDj" onclick="tab('dj')">Vista DJ</button>
    </div>

    <div id="pReg" class="panel active">
        <form id="fPedido">
            <div class="form-group"><label>De:</label><input type="text" id="de" placeholder="Anónimo"></div>
            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:2"><label>Para:</label><input type="text" id="para" placeholder="¿A quién?"></div>
                <div class="form-group" style="flex:1"><label>Grado:</label>
                    <select id="grado"><option value="">-</option><option>9°</option><option>10°</option><option>11°</option><option>Profe</option></select>
                </div>
            </div>
            <div class="form-group"><label>Canción / Artista:</label><input type="text" id="cancion" placeholder="Opcional si es solo saludo"></div>
            <div class="form-group"><label>Mensaje o Saludo:</label><textarea id="msg" rows="2" placeholder="Opcional si es solo canción"></textarea></div>
            <button type="submit" class="btn-save">Guardar Pedido $500</button>
        </form>
    </div>

    <div id="pDj" class="panel">
        <div id="lista-dj"></div>
        <button onclick="askClear()" style="width:100%; background:none; border:1px dashed var(--danger); color:var(--danger); padding:12px; margin-top:15px; border-radius:10px; font-weight:700;">Limpiar completados</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-box">
            <div id="modalTitle" style="font-weight:800; color:var(--primary); text-align:center; margin-bottom:10px"></div>
            <div id="modalBody" style="text-align:center; margin-bottom:15px; font-size:0.95rem"></div>
            <div id="modalBtns" class="modal-btns"></div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let db = JSON.parse(localStorage.getItem('rad_v3')) || [];
        let caja = parseInt(localStorage.getItem('rad_money_v3')) || 0;
        let lastTap = 0;

        function tab(t) {
            document.querySelectorAll('.panel, .tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('p'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
            document.getElementById('t'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');
        }

        function render() {
            const list = document.getElementById('lista-dj');
            list.innerHTML = '';
            document.getElementById('caja').innerText = `$${caja.toLocaleString()}`;
            document.getElementById('pendientes').innerText = db.filter(x => !x.ok).length;

            db.forEach((item, i) => {
                const div = document.createElement('div');
                div.className = `row-dj ${item.ok ? 'done' : ''}`;
                const title = item.cancion || "📢 SÓLO MENSAJE";
                const sub = item.para ? `Para: ${item.para} ${item.grado ? `(${item.grado})` : ''}` : `De: ${item.de}`;
                
                div.innerHTML = `
                    <button class="btn-script" onclick="openScript(${i})">🎙️</button>
                    <div class="row-info" onclick="toggle(${i})">
                        <div class="row-main">${title}</div>
                        <div class="row-sub">${sub}</div>
                    </div>
                    <button class="btn-check" onclick="toggle(${i})">${item.ok ? '✓' : ''}</button>
                `;
                list.appendChild(div);
            });
        }

        document.getElementById('fPedido').onsubmit = function(e) {
            e.preventDefault();
            const de = document.getElementById('de').value.trim() || 'Anónimo';
            const para = document.getElementById('para').value.trim();
            const grado = document.getElementById('grado').value;
            const cancion = document.getElementById('cancion').value.trim();
            const msg = document.getElementById('msg').value.trim();

            if(!cancion && !msg) {
                showToast("Escribe al menos una canción o un mensaje");
                return;
            }

            db.push({ de, para, grado, cancion, msg, ok: false });
            caja += 500;
            save(); this.reset(); render();
            showToast("¡Registrado! +$500");
        };

        function toggle(i) { db[i].ok = !db[i].ok; save(); render(); }
        function save() { localStorage.setItem('rad_v3', JSON.stringify(db)); localStorage.setItem('rad_money_v3', caja); }

        function openModal(title, body, buttons) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerHTML = body;
            const btnContainer = document.getElementById('modalBtns');
            btnContainer.innerHTML = '';
            buttons.forEach(b => {
                const btn = document.createElement('button');
                btn.className = `m-btn ${b.class}`;
                btn.innerText = b.text;
                btn.onclick = () => { document.getElementById('modal').style.display='none'; b.fn(); };
                btnContainer.appendChild(btn);
            });
            document.getElementById('modal').style.display = 'flex';
        }

        function openScript(i) {
            const p = db[i];
            let g = "";
            
            if(p.cancion && p.para) {
                g = `¡Atención! Seguimos con <strong>${p.cancion}</strong>, un tema dedicado para <strong>${p.para}</strong> de parte de <strong>${p.de}</strong>.`;
            } else if(p.cancion) {
                g = `A petición de <strong>${p.de}</strong>, soltamos este temazo: <strong>${p.cancion}</strong>. ¡Que suene!`;
            } else {
                g = `Tenemos un mensaje especial de <strong>${p.de}</strong> para <strong>${p.para || 'todos'}</strong>.`;
            }

            if(p.msg) g += ` <br><br>Nos dice: <em>"${p.msg}"</em>`;

            openModal("🎙️ Guion del Locutor", `<div class="modal-script">${g}</div>`, [{text: "Entendido", class: "btn-ok", fn: ()=>{}}]);
        }

        function askClear() {
            openModal("¿Limpiar?", "Se borrarán solo las canciones ya sonadas.", [
                {text: "No", class: "btn-cancel", fn: ()=>{}},
                {text: "Borrar", class: "btn-confirm", fn: () => { db = db.filter(x=>!x.ok); save(); render(); }}
            ]);
        }

        document.getElementById('cajaDiv').onclick = function() {
            let now = new Date().getTime();
            if(now - lastTap < 300) {
                openModal("Caja", "¿Reiniciar dinero a $0?", [
                    {text: "No", class: "btn-cancel", fn: ()=>{}},
                    {text: "Reiniciar", class: "btn-confirm", fn: () => { caja = 0; save(); render(); }}
                ]);
            }
            lastTap = now;
        };

        function showToast(txt) {
            const t = document.getElementById('toast');
            t.innerText = txt; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }
        render();
    </script>
</body>
</html>
